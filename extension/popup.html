<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="login" class="view hidden">
      <h1>TimeFlow</h1>
      <label>Server URL</label>
      <input id="apiUrl" type="url" placeholder="https://your-backend.up.railway.app" />
      <label>Email</label>
      <input id="email" type="email" autocomplete="email" />
      <label>Password</label>
      <input id="password" type="password" autocomplete="current-password" />
      <button id="loginBtn" class="accent">Sign in</button>
      <p id="loginError" class="error hidden"></p>
    </div>

    <div id="timer" class="view hidden">
      <div class="row">
        <h1>TimeFlow</h1>
        <button id="logoutBtn" class="ghost small">Sign out</button>
      </div>
      <input id="description" type="text" placeholder="What are you working on?" />
      <div class="row">
        <span id="elapsed" class="elapsed hidden">0:00:00</span>
        <button id="startBtn" class="accent hidden">Start</button>
        <button id="stopBtn" class="stop hidden">Stop</button>
      </div>
      <p id="timerError" class="error hidden"></p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
